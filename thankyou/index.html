<!DOCTYPE html>
<html lang="en">
<head>

  <script>setTimeout(function(){ window.history.back(); }, 10000);</script>
  <style>

    .btn{display:inline-block;margin-top:20px;padding:12px 32px;background:#e84393;color:#fff;text-decoration:none;border-radius:8px;border:none;cursor:pointer;font-size:16px}

</head>
